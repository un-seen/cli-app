openapi: "3.0.3"
info:
  title: Petstore API
  version: "1.0.0"
  description: A sample API for managing pets.
servers:
  - url: https://api.petstore.example.com/v1
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    Pet:
      type: object
      required:
        - name
      properties:
        id:
          type: integer
          description: Unique pet ID
        name:
          type: string
          description: Name of the pet
        species:
          type: string
          description: Species of the pet
          enum:
            - dog
            - cat
            - bird
            - fish
        status:
          type: string
          description: Adoption status
          enum:
            - available
            - pending
            - adopted
security:
  - bearerAuth: []
paths:
  /pets:
    get:
      tags:
        - pets
      operationId: listPets
      summary: List all pets
      description: Returns a paginated list of pets with optional filtering by species and status.
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
          description: Maximum number of results
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
          description: Number of results to skip
        - name: species
          in: query
          schema:
            type: string
            enum:
              - dog
              - cat
              - bird
              - fish
          description: Filter by species
        - name: status
          in: query
          schema:
            type: string
            enum:
              - available
              - pending
              - adopted
          description: Filter by adoption status
      responses:
        "200":
          description: A list of pets
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Pet"
    post:
      tags:
        - pets
      operationId: createPet
      summary: Create a new pet
      description: Add a new pet to the store.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - name
                - species
              properties:
                name:
                  type: string
                  description: Name of the pet
                species:
                  type: string
                  description: Species of the pet
                status:
                  type: string
                  description: Adoption status
      responses:
        "201":
          description: Pet created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Pet"
  /pets/{petId}:
    get:
      tags:
        - pets
      operationId: getPet
      summary: Get a pet by ID
      description: Returns a single pet by its unique ID.
      parameters:
        - name: petId
          in: path
          required: true
          schema:
            type: string
          description: The unique ID of the pet
      responses:
        "200":
          description: A single pet
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Pet"
        "404":
          description: Pet not found
    put:
      tags:
        - pets
      operationId: updatePet
      summary: Update a pet
      description: Update an existing pet's information.
      parameters:
        - name: petId
          in: path
          required: true
          schema:
            type: string
          description: The unique ID of the pet
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                  description: Name of the pet
                species:
                  type: string
                  description: Species of the pet
                status:
                  type: string
                  description: Adoption status
      responses:
        "200":
          description: Pet updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Pet"
    delete:
      tags:
        - pets
      operationId: deletePet
      summary: Delete a pet
      description: Remove a pet from the store.
      parameters:
        - name: petId
          in: path
          required: true
          schema:
            type: string
          description: The unique ID of the pet
      responses:
        "204":
          description: Pet deleted
  /health:
    get:
      tags:
        - system
      operationId: healthCheck
      summary: Health check
      description: Returns the health status of the API. No authentication required.
      security: []
      responses:
        "200":
          description: API is healthy
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
